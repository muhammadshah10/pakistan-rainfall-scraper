name: Dynamic Daily Rainfall Scraper

on:
  schedule:
    - cron: '40 6 * * *'  # First run at 11:40 AM PKT (UTC+5)
    # - cron: '40 18 * * *'  # Second run at 11:40 PM PKT (UTC+5)

  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v3

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pandas tqdm urllib3

      - name: 🔎 Test access to PMD pages
        run: |
          echo "Testing homepage..."
          curl -I https://nwfc.pmd.gov.pk/ || true
          echo "Testing rainfall page..."
          curl -I https://nwfc.pmd.gov.pk/new/rainfall.php || true
          echo "Testing rainfall page with browser user-agent..."
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/123.0.0.0 Safari/537.36" -I https://nwfc.pmd.gov.pk/new/rainfall.php || true

      - name: 🚀 Run scraper
        run: |
          python scraper.py

      - name: 🧪 Debug Git Info
        run: |
          echo "🔍 Git Remote:"
          git remote -v
          echo "🔍 Branch Info:"
          git branch
          echo "🔍 Git Status:"
          git status

      - name: 📤 Commit and Push CSV
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git remote set-url origin https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git

          git add *.csv
          git commit -m "Add data for $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}
